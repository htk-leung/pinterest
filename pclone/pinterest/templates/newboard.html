{% extends 'base.html' %}

{% block content %}



<div class="login-container">
    <form action="" method="POST">
        {% csrf_token %}
        <h3>New Board</h3>
        <div class="input-box">            
            <input type="name" name="bname" placeholder="Board Name" required>
        </div>

        <div class="input-box">            
            <input type="text" name="req"
            placeholder="Comment : Everyone / Friends" 
            required>
        </div>
        <div>
            <button type="submit">Save</button>
        </div>

    </form>
</div>

{% endblock %}
