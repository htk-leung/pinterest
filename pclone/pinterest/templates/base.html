        <main> <!-- holds content of website -->
            
            {% block content %}
            {% endblock %}

        </main>

        <div class="search-bar-body">
            <div class="search-bar-container">

                <form id="search-form" action="{% url 'home' %}" method="POST" class="search-bar-container">
                    {% csrf_token %}
                    <!-- Hidden input to store the selected category -->
                    <input type="hidden" id="selected-category" name="category" value="everything">

                    <!-- dropdown starts -->
                    <div class="dropdown">
                        <div id="dropdown-text" class="dropdown-text">
                            <span id="category">Everything</span>
                            <svg id="dropicon" xmlns="http://www.w3.org/2000/svg" height="35px" viewBox="0 -960 960 960" width="35px" fill="#e3e3e3">
                                <path d="M480-344 240-584l47.33-47.33L480-438.67l192.67-192.66L720-584 480-344Z"/>
                            </svg>                   
                        </div>
                        <ul id="droplist" class="dropdown-list">
                            <li class="dropdown-list-item">All pins</li>
                            <li class="dropdown-list-item">Your streams</li>
                        </ul>
                    </div>

                    <!-- dropdown ends -->

                    <!-- search box input starts -->
                    <div class="search-box">
                        <input type="text" id="search-input" name="search-input" placeholder="Search">
                        <svg xmlns="http://www.w3.org/2000/svg" height="30px" viewBox="0 -960 960 960" width="30px" fill="#e3e3e3">
                            <path d="M792-120.67 532.67-380q-30 25.33-69.64 39.67Q423.39-326 378.67-326q-108.44 0-183.56-75.17Q120-476.33 120-583.33t75.17-182.17q75.16-75.17 182.5-75.17 107.33 0 182.16 75.17 74.84 75.17 74.84 182.27 0 43.23-14 82.9-14 39.66-40.67 73l260 258.66-48 48Zm-414-272q79.17 0 134.58-55.83Q568-504.33 568-583.33q0-79-55.42-134.84Q457.17-774 378-774q-79.72 0-135.53 55.83-55.8 55.84-55.8 134.84t55.8 134.83q55.81 55.83 135.53 55.83Z"/>
                        </svg>
                    </div>
                    <!-- search box input ends -->

                </form>
